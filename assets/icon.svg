<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Database cylinder -->
  <ellipse cx="256" cy="170" rx="130" ry="45" fill="none" stroke="#00d2ff" stroke-width="12"/>
  <line x1="126" y1="170" x2="126" y2="340" stroke="#00d2ff" stroke-width="12"/>
  <line x1="386" y1="170" x2="386" y2="340" stroke="#00d2ff" stroke-width="12"/>
  <ellipse cx="256" cy="340" rx="130" ry="45" fill="none" stroke="#00d2ff" stroke-width="12"/>
  <!-- Middle ring -->
  <ellipse cx="256" cy="255" rx="130" ry="45" fill="none" stroke="#00d2ff" stroke-width="6" opacity="0.4"/>
  <!-- Magnifying glass -->
  <circle cx="340" cy="370" r="55" fill="none" stroke="#4ade80" stroke-width="14"/>
  <line x1="380" y1="410" x2="430" y2="460" stroke="#4ade80" stroke-width="14" stroke-linecap="round"/>
</svg>
